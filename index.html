<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Course Mgmt">
  <meta name="theme-color" content="#0d1117">
  <title>Course Management</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

  <!-- ── Course Select ───────────────────────────────────────────────────── -->
  <section id="course-select" class="screen">
    <div class="select-header">
      <div class="masthead-label">Golf Decision Game</div>
      <h1>Course Management</h1>
      <p>Make the call. Live with it.</p>
    </div>

    <div id="course-grid"></div>
  </section>

  <!-- ── Hole Screen ─────────────────────────────────────────────────────── -->
  <section id="hole-screen" class="screen">
    <div class="hole-topbar">
      <div class="hole-topbar-left">
        <button class="back-to-menu-btn" id="back-to-menu-btn">← Menu</button>
        <div class="hole-course-label" id="hole-course-name">Pebble Beach</div>
        <div class="hole-title" id="hole-number">Hole 1</div>
        <div class="hole-meta">
          <div class="hole-tag" id="hole-par">Par 4</div>
          <div class="hole-tag" id="hole-yardage">377 yards</div>
        </div>
      </div>
      <div class="score-pill" id="scorecard-toggle">
        <span>Score</span>
        <strong id="running-score">E</strong>
      </div>
    </div>

    <div id="scorecard-drawer" class="scorecard-drawer">
      <div class="scorecard-strip" id="scorecard-strip"></div>
    </div>

    <div id="hole-diagram" class="hole-diagram"></div>

    <div class="hole-body">
      <div class="situation-box">
        <div class="situation-label">The Situation</div>
        <div id="hole-situation"></div>
      </div>

      <div class="choices-label">Your Decision</div>
      <div id="choices-container"></div>

      <button class="confirm-btn" id="confirm-btn" disabled>Commit to This Play</button>

      <div class="shot-in-flight hidden" id="shot-in-flight">
        <svg class="ball-flight-svg" viewBox="0 0 300 90" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="ballGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Ground -->
          <line x1="0" y1="83" x2="300" y2="83" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
          <!-- Tee -->
          <rect x="10" y="80" width="8" height="3" rx="1" fill="#22c55e" opacity="0.5"/>
          <!-- Flag pin -->
          <line x1="281" y1="48" x2="281" y2="83" stroke="#4a6580" stroke-width="1.5"/>
          <polygon points="281,48 298,57 281,66" fill="#ef4444" opacity="0.85"/>
          <!-- Ball -->
          <circle fill="white" filter="url(#ballGlow)">
            <animateMotion dur="1.5s" repeatCount="indefinite" calcMode="spline"
              keyTimes="0;1" keySplines="0.3 0 0.7 1"
              path="M 14 81 Q 148 3 279 81"/>
            <animate attributeName="opacity" dur="1.5s" repeatCount="indefinite" calcMode="linear"
              keyTimes="0;0.06;0.88;1" values="0;1;1;0"/>
            <animate attributeName="r" dur="1.5s" repeatCount="indefinite" calcMode="spline"
              keyTimes="0;0.5;1" values="5.5;3;5.5" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
          </circle>
        </svg>
        <div class="flight-label">Ball in the air</div>
      </div>

      <div class="outcome-area hidden" id="outcome-area">
        <div class="outcome-header">
          <div class="outcome-badge" id="outcome-badge">Par</div>
          <div class="outcome-result" id="outcome-result">Running total: E</div>
        </div>
        <div class="caddie-section">
          <div class="caddie-label">Caddie's Take</div>
          <div id="caddie-text"></div>
        </div>
        <button class="next-btn" id="next-btn">Next Hole →</button>
      </div>
    </div>
  </section>

  <!-- ── Final Scorecard ─────────────────────────────────────────────────── -->
  <section id="final-screen" class="screen">
    <div class="final-header">
      <div class="final-course" id="final-course-name">Pebble Beach Golf Links</div>
      <div class="final-score" id="final-total-score">E</div>
      <div class="final-score-label" id="final-label">Mid-Amateur</div>
      <div class="final-best hidden" id="final-best"></div>
    </div>

    <div class="final-body">
      <div class="stats-grid" id="final-stats"></div>

      <div class="scorecard-section-label">Hole-by-Hole</div>
      <table class="scorecard-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Par</th>
            <th>Yds</th>
            <th>Result</th>
            <th>+/−</th>
          </tr>
        </thead>
        <tbody id="final-scorecard-table"></tbody>
      </table>

      <div class="final-actions">
        <button class="btn-primary" id="play-again-btn">Play Again</button>
        <button class="btn-secondary" id="home-btn">Choose Another Course</button>
      </div>
    </div>
  </section>

  <script src="scenarios.js"></script>
  <script src="diagrams.js"></script>
  <script src="app.js"></script>
</body>
</html>
